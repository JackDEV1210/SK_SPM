<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akademi Pengekodan: Pembangunan Pangkalan Data Hubungan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Fira+Code:wght@400;500&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
        }
        
        .code-font {
            font-family: 'Fira Code', monospace;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .nav-item.active {
            background-color: #f97316; /* Orange 500 */
            color: white;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen overflow-hidden selection:bg-orange-500 selection:text-white bg-slate-900">

    <!-- Mobile Header -->
    <div class="md:hidden bg-slate-800 border-b border-slate-700 p-4 flex justify-between items-center z-30">
        <h1 class="text-lg font-bold text-white flex items-center gap-2">
            <i class="fas fa-database text-orange-500"></i> Akademi Kod (2.3)
        </h1>
        <button id="mobile-menu-btn" class="text-slate-300 hover:text-white focus:outline-none">
            <i class="fas fa-bars text-2xl"></i>
        </button>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-slate-900/80 z-40 hidden md:hidden backdrop-blur-sm transition-opacity"></div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300 z-50 w-72 bg-slate-800 border-r border-slate-700 flex flex-col h-full shadow-2xl md:shadow-none">
        <div class="p-6 border-b border-slate-700 hidden md:block">
            <h1 class="text-xl font-bold text-white flex items-center gap-3">
                <i class="fas fa-database text-orange-500"></i>
                Akademi Kod
            </h1>
            <p class="text-xs text-slate-400 mt-2">Sains Komputer - Topik 2.3</p>
        </div>
        
        <div class="p-4 md:hidden flex justify-between items-center border-b border-slate-700">
            <span class="text-white font-bold text-lg">Menu Navigasi</span>
            <button id="close-sidebar-btn" class="text-slate-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div class="p-4 border-b border-slate-700 bg-slate-800/50">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-slate-300">Pengalaman (XP)</span>
                <span id="xp-counter" class="text-sm font-bold text-yellow-400">0 / 2000</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2.5">
                <div id="xp-bar" class="bg-yellow-400 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-1">
            <a href="index.html" class="w-full flex items-center gap-3 px-4 py-3 mb-4 rounded-lg text-left text-white bg-slate-800 hover:bg-slate-700 transition-colors border border-slate-600 shadow-md">
                <i class="fas fa-arrow-left w-5 text-center text-rose-400"></i>
                <span class="font-bold">Kembali ke Portal</span>
            </a>

            <div class="pt-2 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Modul Pembelajaran</div>
            <button onclick="loadModule('modul1')" id="nav-modul1" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-table text-blue-400 w-5 text-center"></i>
                <span class="text-sm md:text-base">M1: Bina Jadual</span>
            </button>
            <button onclick="loadModule('modul2')" id="nav-modul2" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="far fa-window-maximize text-emerald-400 w-5 text-center"></i>
                <span class="text-sm md:text-base">M2: Cipta Borang</span>
            </button>
            <button onclick="loadModule('modul3')" id="nav-modul3" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-keyboard text-amber-400 w-5 text-center"></i>
                <span class="text-sm md:text-base">M3: Kemasukan Data</span>
            </button>
            <button onclick="loadModule('modul4')" id="nav-modul4" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-search text-purple-400 w-5 text-center"></i>
                <span class="text-sm md:text-base">M4: Membina Query</span>
            </button>
            <button onclick="loadModule('modul5')" id="nav-modul5" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-print text-rose-400 w-5 text-center"></i>
                <span class="text-sm md:text-base">M5: Menjana Laporan</span>
            </button>
            <button onclick="loadModule('modul6')" id="nav-modul6" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-bars text-teal-400 w-5 text-center"></i>
                <span class="text-sm md:text-base">M6: Menu Makro</span>
            </button>
            <button onclick="loadModule('modul7')" id="nav-modul7" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-book text-indigo-400 w-5 text-center"></i>
                <span class="text-sm md:text-base">M7: Dokumentasi</span>
            </button>
            <div class="pt-4 pb-2 px-4 text-xs font-semibold text-slate-500 uppercase tracking-wider">Penilaian</div>
            <button onclick="loadModule('ujian')" id="nav-ujian" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left text-slate-300 hover:bg-slate-700 transition-colors">
                <i class="fas fa-trophy w-5 text-center text-yellow-400"></i>
                <span class="text-sm md:text-base">Ujian Akhir (Boss)</span>
            </button>
        </nav>
        
        <div class="p-4 border-t border-slate-700 bg-slate-900 text-center">
            <span class="text-xs font-bold text-slate-500"><i class="fas fa-clock mr-1"></i> Masa Pembelajaran: 30 Jam</span>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 relative overflow-y-auto h-full">
        <!-- Toast Notification -->
        <div id="toast" class="fixed top-5 right-5 z-50 transform transition-transform duration-300 translate-x-full bg-slate-800 border border-slate-600 px-4 py-3 md:px-6 md:py-4 rounded-lg shadow-xl flex items-center gap-3">
            <i id="toast-icon" class="fas fa-check-circle text-green-400 text-lg md:text-xl"></i>
            <div>
                <h4 id="toast-title" class="font-bold text-white text-sm md:text-base">Berjaya!</h4>
                <p id="toast-msg" class="text-xs md:text-sm text-slate-300">Jawapan anda tepat.</p>
            </div>
        </div>

        <div id="content-area" class="max-w-5xl mx-auto p-4 md:p-8 pb-24 md:pb-20">
            <!-- Content gets injected here -->
        </div>
    </main>

    <script>
        // --- Mobile Menu Logic ---
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        if(mobileMenuBtn) mobileMenuBtn.addEventListener('click', toggleSidebar);
        if(closeSidebarBtn) closeSidebarBtn.addEventListener('click', toggleSidebar);
        if(overlay) overlay.addEventListener('click', toggleSidebar);

        // --- State Management ---
        let currentXP = 0;
        const state = { 
            m1_done: false, m2_done: false, m3_done: false, 
            m4_done: false, m5_done: false, m6_done: false, m7_done: false, ujian_done: false 
        };

        function addXP(amount) {
            currentXP += amount;
            if (currentXP > 2000) currentXP = 2000;
            document.getElementById('xp-counter').innerText = `${currentXP} / 2000`;
            document.getElementById('xp-bar').style.width = `${(currentXP / 2000) * 100}%`;
            
            const counter = document.getElementById('xp-counter');
            counter.classList.add('scale-125', 'text-white');
            setTimeout(() => counter.classList.remove('scale-125', 'text-white'), 300);
        }

        function showToast(title, msg, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-msg').innerText = msg;
            
            if (type === 'success') {
                icon.className = 'fas fa-check-circle text-green-400 text-xl';
                toast.style.borderLeft = '4px solid #4ade80';
            } else {
                icon.className = 'fas fa-times-circle text-red-400 text-xl';
                toast.style.borderLeft = '4px solid #f87171';
            }

            toast.classList.remove('translate-x-full');
            setTimeout(() => { toast.classList.add('translate-x-full'); }, 3000);
        }

        function updateNavActive(moduleId) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeBtn = document.getElementById(`nav-${moduleId}`);
            if(activeBtn) activeBtn.classList.add('active');
        }

        function loadModule(moduleId) {
            // Close mobile sidebar when navigating
            if (window.innerWidth < 768 && !sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            const container = document.getElementById('content-area');
            updateNavActive(moduleId);
            window.scrollTo(0, 0);
            
            let html = '';

            switch (moduleId) {
                case 'modul1':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-blue-500/20 text-blue-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">2.3.1</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Membina Jadual (Table)</h2>
                            </div>
                            
                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-8 mb-8 text-slate-300 text-sm md:text-base leading-relaxed shadow-lg">
                                <p class="mb-4">Selepas Skema Hubungan 3NF dihasilkan, fasa amali bermula. Kita akan menggunakan Perisian Sistem Pengurusan Pangkalan Data Hubungan (RDBMS) seperti <strong>Microsoft Access</strong> atau <strong>MySQL</strong> untuk membina pangkalan data sebenar secara fizikal.</p>
                                <p class="mb-4">Langkah paling pertama yang wajib dibuat ialah <strong>Membina Jadual (Table)</strong> berdasarkan ERD dan skema yang telah dirancang. Tanpa jadual, tiada tempat untuk menyimpan rekod.</p>
                                
                                <h3 class="font-bold text-white text-lg mt-8 mb-4 border-b border-slate-700 pb-2"><i class="fas fa-sliders-h text-blue-400 mr-2"></i>Tetapan Jenis Data (Data Types)</h3>
                                <p class="mb-4">Semasa mencipta medan (field), komputer perlu tahu jenis data yang sesuai supaya kapasiti memori dapat dioptimumkan dan pengiraan (jika ada) dapat dilakukan.</p>
                                
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                        <h4 class="text-blue-400 font-bold mb-1">Short Text / Text</h4>
                                        <p class="text-xs text-slate-400">Untuk teks biasa, gabungan huruf & nombor (Alfanumerik) yang tidak memerlukan pengiraan matematik. (Cth: Nama, No KP, Alamat, No Telefon).</p>
                                    </div>
                                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                        <h4 class="text-amber-400 font-bold mb-1">Number / Integer</h4>
                                        <p class="text-xs text-slate-400">Hanya untuk nombor. Digunakan terutamanya jika nilai itu akan ditambah/didarab kelak. (Cth: Umur, Kuantiti Stok).</p>
                                    </div>
                                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                        <h4 class="text-emerald-400 font-bold mb-1">Date/Time</h4>
                                        <p class="text-xs text-slate-400">Menyimpan format tarikh atau masa yang sah. (Cth: Tarikh Lahir, Waktu Log Masuk).</p>
                                    </div>
                                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                        <h4 class="text-rose-400 font-bold mb-1">AutoNumber / Auto Increment</h4>
                                        <p class="text-xs text-slate-400">Sistem mencipta nombor unik secara berturutan secara automatik tanpa perlu ditaip. Sangat sesuai dijadikan Kunci Primer (Primary Key).</p>
                                    </div>
                                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700 md:col-span-2">
                                        <h4 class="text-purple-400 font-bold mb-1">Currency / Decimal</h4>
                                        <p class="text-xs text-slate-400">Menyimpan nilai mata wang yang mempunyai titik perpuluhan yang tepat. (Cth: RM 50.50, Harga Barang).</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6 shadow-lg">
                                <h3 class="text-lg md:text-xl font-bold text-white mb-4"><i class="fas fa-tasks text-blue-400 mr-2"></i>Uji Kefahaman</h3>
                                <p class="text-sm text-slate-300 mb-4">Anda sedang membina jadual PELANGGAN. Anda mempunyai satu medan bernama <strong>"No_Telefon_Bimbit"</strong>. Apakah jenis data yang <strong>PALING TEPAT</strong> untuk medan ini di dalam Microsoft Access?</p>
                                
                                <div class="flex flex-col sm:flex-row gap-3 mt-4">
                                    <button onclick="checkM1('Number')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded px-6 py-3 transition-colors text-sm font-semibold flex-1">Number</button>
                                    <button onclick="checkM1('Short Text')" class="bg-slate-700 hover:bg-blue-600 border border-blue-500 text-white rounded px-6 py-3 transition-colors text-sm font-semibold flex-1 shadow-[0_0_10px_rgba(59,130,246,0.3)]">Short Text</button>
                                    <button onclick="checkM1('AutoNumber')" class="bg-slate-700 hover:bg-slate-600 border border-slate-600 text-white rounded px-6 py-3 transition-colors text-sm font-semibold flex-1">AutoNumber</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul2':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-emerald-500/20 text-emerald-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">2.3.2</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Mencipta Borang (Form)</h2>
                            </div>
                            
                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-8 mb-8 text-slate-300 text-sm md:text-base leading-relaxed shadow-lg">
                                <p class="mb-4">Walaupun data disimpan di dalam jadual (Table), pengguna biasa (seperti kerani atau pelanggan) <strong>tidak patut dibenarkan</strong> membuka dan menaip terus ke dalam paparan Jadual secara langsung.</p>
                                <p class="mb-6">Ini kerana paparan Jadual sukar dibaca jika datanya terlalu banyak, tidak mesra pengguna, dan mudah berlakunya ralat tidak sengaja (seperti terpadam rekod orang lain). Oleh itu, kita membina <strong>Borang (Form)</strong>.</p>
                                
                                <div class="bg-slate-900 border-l-4 border-emerald-500 p-5 rounded text-sm mb-8">
                                    <h3 class="text-white font-bold mb-2">Mengapa Guna Borang (Form)?</h3>
                                    <ul class="list-disc pl-5 space-y-1 text-slate-400">
                                        <li>Menyediakan Antara Muka Bergrafik (GUI) yang cantik, moden dan kemas.</li>
                                        <li>Memaparkan hanya satu rekod sahaja pada satu-satu masa (fokus).</li>
                                        <li>Memudahkan kawalan butang tindakan (Simpan, Padam, Seterusnya).</li>
                                        <li>Melindungi struktur asal pangkalan data daripada diakses secara terbuka.</li>
                                    </ul>
                                </div>

                                <h3 class="font-bold text-white text-lg mb-4 border-b border-slate-700 pb-2"><i class="fas fa-layer-group text-emerald-400 mr-2"></i>Komponen Utama Paparan Borang</h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-center">
                                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                        <h4 class="text-emerald-400 font-bold mb-1">Form Header</h4>
                                        <p class="text-xs text-slate-400">Bahagian atas sekali. Mengandungi Tajuk borang dan logo syarikat.</p>
                                    </div>
                                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                        <h4 class="text-emerald-400 font-bold mb-1">Detail</h4>
                                        <p class="text-xs text-slate-400">Kawasan tengah yang menempatkan kotak teks (text box), label, dan kotak kombo untuk input data.</p>
                                    </div>
                                    <div class="bg-slate-900 p-4 rounded-lg border border-slate-700">
                                        <h4 class="text-emerald-400 font-bold mb-1">Form Footer</h4>
                                        <p class="text-xs text-slate-400">Bahagian bawah. Sering digunakan untuk meletakkan butang-butang navigasi atau arahan kawalan.</p>
                                    </div>
                                </div>
                            </div>

                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-6 shadow-lg">
                                <h3 class="text-lg md:text-xl font-bold text-white mb-4"><i class="fas fa-question-circle text-emerald-400 mr-2"></i>Uji Kefahaman</h3>
                                <p class="text-sm text-slate-300 mb-4">Apakah perbezaan paling jelas antara memasukkan data terus ke dalam 'Table' berbanding menggunakan 'Form'?</p>
                                
                                <div class="flex flex-col gap-3 mt-4">
                                    <button onclick="checkM2('A')" class="bg-slate-700 hover:bg-emerald-600 hover:border-emerald-500 border border-slate-600 text-white rounded px-4 py-4 transition-colors text-sm text-left shadow-sm">A) 'Form' menyimpan data secara berasingan tanpa kaitan dengan 'Table'.</button>
                                    <button onclick="checkM2('B')" class="bg-slate-700 hover:bg-emerald-600 hover:border-emerald-500 border border-slate-600 text-white rounded px-4 py-4 transition-colors text-sm text-left shadow-sm font-semibold border-emerald-500/30">B) 'Form' menyajikan antaramuka (GUI) yang memfokuskan kepada paparan satu rekod pada satu masa demi kemudahan pengguna.</button>
                                    <button onclick="checkM2('C')" class="bg-slate-700 hover:bg-emerald-600 hover:border-emerald-500 border border-slate-600 text-white rounded px-4 py-4 transition-colors text-sm text-left shadow-sm">C) Memasukkan data di 'Table' memerlukan sambungan internet manakala 'Form' tidak.</button>
                                </div>
                            </div>
                        </div>
                    `;
                    break;

                case 'modul3':
                    html = `
                        <div class="animate-fade-in">
                            <div class="flex items-center gap-3 mb-4 md:mb-6">
                                <span class="bg-amber-500/20 text-amber-400 py-1 px-3 rounded-full text-xs md:text-sm font-bold flex-shrink-0">2.3.3</span>
                                <h2 class="text-2xl md:text-3xl font-bold text-white leading-tight">Kemasukan Data & Validasi</h2>
                            </div>
                            
                            <div class="bg-slate-800 border border-slate-700 rounded-xl p-5 md:p-8 mb-8 text-slate-300 text-sm md:text-base leading-relaxed shadow-lg">
                                <p class="mb-4">Apabila jadual dan borang telah tersedia, fasa seterusnya adalah <strong>Kemasukan Data</strong>. Proses ini membolehkan pengguna mula menaip maklumat untuk disimpan ke dalam sistem.</p>
                                
                                <p class="mb-6">Namun, manusia sering melakukan kesilapan. Bagaimana jika pengguna menaip "Dua Puluh" ke dalam ruangan Umur yang memerlukan nombor? Untuk mencegah sistem dari 'crash' dan memastikan integriti data terpelihara, kita mesti mewujudkan <strong>Peraturan Pengesahan (Validation)</strong>.</p>

                                <h3 class="font-bold text-white text-lg mb-4 border-b border-slate-700 pb-2"><i class="fas fa-shield-check text-amber-400 mr-2"></i>Kaedah Pengesahan Data (Data Validation)</h3>
                                
                                <div class="space-y-4">
                                    <div class="bg-slate-900 border-l-4 border-amber-500 p-4 rounded-lg flex flex-col md:flex-row gap-4 items-start">
                                        <div class="w-full md:w-1/3 text-amber-300 font-bold">Validation Rule<br><span class="text-xs font-normal text-slate-500">(Peraturan Pengesahan)</span></div>
                                        <div class="w-full md:w-2/3 text-sm text-slate-400">
                                            Satu syarat logik yang disetkan pada ciri medan (field properties) untuk membataskan nilai yang boleh dimasukkan.<br>
                                            <code class="bg-slate-800 text-amber-200 px-2 py-1 rounded mt-2 inline-block">Cth: >=0 And <=100</code>
                                        </div>
                                    </div>
                                    <div class="bg-slate-900 border-l-4 border-amber-500 p-4 rounded-lg flex flex-col md:flex-row gap-4 items-start">
                                        <div class="w-full md:w-1/3 text-amber-300 font-bold">Validation Text<br><span class="text-xs font-normal text-slate-500">(Teks Mesej Ralat)</span></div>
                                        <div class="w-full md:w-2/3 text-sm text-slate-400">
                                            Mesej pop-up amaran yang dipaparkan sekiranya pengguna melanggar Validation Rule yang telah ditetapkan di atas.<br>
                                            <code class="bg-slate-800 text-amber-200 px-2 py-1 rounded mt-2 inline-block">Cth: "Markah mestilah di antara 0 hingga 100 sahaja!"</code>

        }

        function checkM1(val) {

                if(!state.m1_done) { addXP(100); state.m1_done = true; }
                showToast("Tepat Sekali!", "Meskipun dinamakan 'Nombor', Telefon Bimbit (Cth: 012...) dimulakan dengan angka Sifar. Jika guna 'Number', MS Access membuang angka sifar di hadapan. Oleh itu, 'Short Text' paling tepat!");

            }
        }

        function checkM4(val) {
            if (val === 'B') {
                if(!state.m4_done) { addXP(150); state.m4_done = true; }
                showToast("Sempurna!", "Meletakkan kriteria pada baris (row) 'Criteria' yang SAMA mengaktifkan logik operasi 'AND'.");
            } else {
                showToast("Tersasar", "Perhatikan kedudukan row (baris). Jika row sama ia bermaksud operasi 'DAN'.", "error");
            }
        }

        function checkM5(val) {
            if (val === 'C') {
                if(!state.m5_done) { addXP(100); state.m5_done = true; }
                showToast("Tepat!", "Query digunakan untuk mencari/tapis 10 markah tertinggi dahulu, kemudian kita cipta Report berdasarkan Query tadi untuk bentang.");
            } else {
                showToast("Salah", "Fikirkan fasa penapisan maklumat dan dokumen yang sesuai untuk dicetak dan dibawa ke mesyuarat.", "error");
            }
        }

        function checkM6(val) {
            if (val === 'C') {
                if(!state.m6_done) { addXP(150); state.m6_done = true; }
                showToast("Sempurna!", "Macro Builder digunakan untuk membina satu tindakan (action/event) automatik pada butang Switchboard.");
            } else if(val === "") {
                showToast("Sila Pilih", "Pilih jawapan dari senarai.", "error");
            } else {
                showToast("Tidak Tepat", "Bina arahan tindakan dikawal oleh pembina jenis 'Makro'.", "error");
            }
        }

        function checkM7(val) {
            if (val === 'A') {
                if(!state.m7_done) { addXP(100); state.m7_done = true; }
                showToast("Hebat!", "Maklumat struktur teknikal sistem (skema, ERD) di simpan di bawah fail Dokumentasi Dalaman sebagai rujukan pembangun.");
            } else {
                showToast("Tidak Tepat", "Adakah pengguna/klien yang menaip data perlukan gambar ERD anda? Pasti tidak. Fikirkan golongan sasar.", "error");
            }
        }

        function checkUjian() {
            const answers = { 
                uq1: 'B', uq2: 'A', uq3: 'A', uq4: 'A', uq5: 'B', uq6: 'A', uq7: 'A', uq8: 'B', uq9: 'B', uq10: 'A', uq11: 'A', uq12: 'A', uq13: 'A', uq14: 'B', uq15: 'A',
                uq16: 'A', uq17: 'B', uq18: 'B', uq19: 'A', uq20: 'B', uq21: 'A', uq22: 'B', uq23: 'A', uq24: 'B', uq25: 'A', uq26: 'B', uq27: 'A', uq28: 'B', uq29: 'A', uq30: 'B',
                uq31: 'A', uq32: 'B', uq33: 'A', uq34: 'B', uq35: 'A', uq36: 'B', uq37: 'A', uq38: 'B', uq39: 'A', uq40: 'B', uq41: 'A', uq42: 'B', uq43: 'A', uq44: 'B', uq45: 'A',
                uq46: 'B', uq47: 'A', uq48: 'B', uq49: 'A', uq50: 'B'
            };
            let allAnswered = true, allCorrect = true;

            for (let i = 1; i <= 50; i++) {
                const q = document.querySelector(`input[name="uq${i}"]:checked`);
                if (!q) { allAnswered = false; break; }
                if (q.value !== answers[`uq${i}`]) { allCorrect = false; }
            }

            if (!allAnswered) {
                showToast("Perhatian", "Sila jawab kesemua 50 soalan Boss Battle.", "error"); return;
            }

            if (allCorrect) {
                if(!state.ujian_done) { addXP(1000); state.ujian_done = true; }
                document.getElementById('content-area').innerHTML = `
                    <div class="animate-fade-in text-center pt-10 md:pt-20 pb-20">
                        <i class="fas fa-medal text-7xl md:text-9xl text-orange-400 mb-8 drop-shadow-[0_0_30px_rgba(249,115,22,0.5)]"></i>
                        <h1 class="text-3xl md:text-4xl font-bold text-white mb-4">Tahniah! Anda Lulus Cemerlang 50 Soalan!</h1>
                        <p class="text-sm md:text-xl text-slate-300 max-w-2xl mx-auto px-4">Anda telah benar-benar menguasai asas Pembinaan Pangkalan Data Hubungan dan Microsoft Access dengan sangat gemilang!</p>
                        <p class="mt-8 text-xl md:text-2xl font-bold text-orange-400">Total XP: ${currentXP}</p>
                        <div class="mt-12">
                            <a href="index.html" class="inline-block bg-orange-600 hover:bg-orange-500 text-white px-6 md:px-8 py-3 md:py-4 rounded-xl font-bold text-sm md:text-lg transition-colors shadow-lg shadow-orange-900/50">
                                <i class="fas fa-home mr-2"></i> Kembali ke Portal Utama
                            </a>
                        </div>
                    </div>
                `;
                window.scrollTo(0, 0);
            } else {
                showToast("Gagal", "Terdapat jawapan yang salah. Sila ulangkaji modul dan cuba lagi.", "error");
            }
        }

        window.onload = () => { loadModule('modul1'); };
    </script>
